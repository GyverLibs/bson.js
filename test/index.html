<!DOCTYPE html>

<body>
    <button id="req">REQUEST</button>
    <p id="out" style="white-space: break-spaces;"></p>

    <script type="module">
        import { decodeBson, encodeBson, BSCode } from 'https://gyverlibs.github.io/bson.js/dist/bson.js';
        // import { decodeBson, encodeBson, BSCode } from '/bson.js';

        const url = 'http://192.168.1.54';

        const codes = [
            'some',
            'string',
            'constants',
        ];

        // =========== encode ===========
        let test = {
            sint: 20n,
            bint: 2000n,
            int: 123,
            nint: -123,
            float: 3.14,
            float0: 0.0,
            arr: [
                "str",
                "0123456789012345678901234567890123456789",
                true,
                123456789876543,
                -123456789876543,
                new Uint8Array([1, 2, 3]),
                new Uint8Array([]),
            ],
            obj: {
                str2: "str2",
                true: true,
            },
            str3: "str3",
            nul: null,
            [BSCode('constants1')]: BSCode('string1'),
            [BSCode('constants')]: BSCode('string'),
            bins: new Uint8Array([1, 2, 3]),
        };

        let enc = encodeBson(test, codes);
        let json = decodeBson(enc, codes);
        console.log(json);

        // =========== request ===========
        req.onclick = async () => {
            let res = await fetch(url + '/bson');
            try {
                let arr = new Uint8Array(await res.arrayBuffer());
                let json = decodeBson(arr, codes);
                console.log(arr);
                console.log(JSON.stringify(json), JSON.stringify(json).length);
                console.log(json);
                out.innerText = JSON.stringify(json, null, 2);
            } catch (e) {
                console.log(e);
                out.innerText = e;
            }
        }
    </script>
</body>

</html>
